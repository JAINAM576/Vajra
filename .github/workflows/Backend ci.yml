name: Backend CI

# This lives in the Vajra (backend) repo, at the repo root — no path filters
# needed since this whole repo IS the backend. Deployment is handled by
# Render/Railway/Vercel's native GitHub integration once you connect this
# repo in their dashboard (see CI-CD-SETUP.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
